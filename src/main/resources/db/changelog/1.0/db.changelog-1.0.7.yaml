databaseChangeLog:
  - changeSet:
      id: 1.0.7-create-streets-table
      author: salmansalmanov
      changes:
        - createTable:
            tableName: streets
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR
                  constraints:
                    nullable: false
              - column:
                  name: city_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: streets
            baseColumnNames: city_id
            referencedTableName: cities
            referencedColumnNames: id
            constraintName: fk_streets_city_id